<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.K. Farm Project Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .status {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .badge-complete { background: #4caf50; color: white; }
        .badge-progress { background: #ff9800; color: white; }
        .badge-pending { background: #f44336; color: white; }
        
        /* TAB STYLES */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-button {
            padding: 12px 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab-button:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }
        
        .tab-button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .card-content {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .item-list {
            list-style: none;
        }
        
        .item-list li {
            padding: 10px;
            border-left: 4px solid #667eea;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        
        .item-list li strong {
            color: #333;
        }
        
        .item-list li span {
            color: #666;
            font-size: 14px;
            display: block;
            margin-top: 3px;
        }
        
        /* TODAY'S TASKS STYLES */
        .summary-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 4px solid;
        }
        
        .summary-card.critical {
            border-top-color: #c62828;
        }
        
        .summary-card.high {
            border-top-color: #e65100;
        }
        
        .summary-card.total {
            border-top-color: #01579b;
        }
        
        .summary-number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .summary-card.critical .summary-number { color: #c62828; }
        .summary-card.high .summary-number { color: #e65100; }
        .summary-card.total .summary-number { color: #01579b; }
        
        .summary-label {
            color: #666;
            font-size: 14px;
        }
        
        /* TASK CARDS */
        .tasks-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .task-card {
            background: white;
            border-radius: 10px;
            border-left: 5px solid;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .task-card.critical {
            border-left-color: #c62828;
            background: #ffebee;
        }
        
        .task-card.high {
            border-left-color: #e65100;
            background: #fff3e0;
        }
        
        .task-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .task-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .task-badge {
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(0,0,0,0.1);
            color: #333;
        }
        
        .task-section {
            margin-bottom: 12px;
        }
        
        .task-label {
            color: #666;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .task-text {
            color: #333;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .task-action {
            background: rgba(0,0,0,0.05);
            padding: 12px;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            color: #333;
            font-weight: 500;
            margin: 12px 0;
        }
        
        .task-updates {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        
        .update-item {
            font-size: 12px;
            margin-bottom: 6px;
            color: #666;
        }
        
        .update-date {
            color: #999;
            font-weight: bold;
        }
        
        .update-msg {
            color: #333;
        }
        
        .chatbot-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chat-box {
            border: 1px solid #ddd;
            border-radius: 8px;
            height: 400px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9f9f9;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 8px;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
        }
        
        .message.bot .message-content {
            background: #e0e0e0;
            color: #333;
        }
        
        .chat-input {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .chat-input button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .chat-input button:hover {
            background: #764ba2;
        }
        
        .loading {
            color: #999;
            font-style: italic;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>🏗️ K.K. Farm Project Dashboard</h1>
            <div class="status">
                <div class="status-item">
                    <span>Status:</span>
                    <span class="status-badge badge-pending">⚠️ Behind Schedule</span>
                </div>
                <div class="status-item">
                    <span>Completion:</span>
                    <span class="status-badge badge-progress">57% Done</span>
                </div>
                <div class="status-item">
                    <span>Risk Level:</span>
                    <span class="status-badge badge-pending">🔴 Critical</span>
                </div>
            </div>
        </header>
        
        <!-- TAB NAVIGATION -->
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('todaytasks', event)">📋 Today's Tasks</button>
            <button class="tab-button" onclick="switchTab('workprogress', event)">📊 Work Progress</button>
            <button class="tab-button" onclick="switchTab('vendors', event)">👥 Vendor Status</button>
            <button class="tab-button" onclick="switchTab('chat', event)">🤖 Chat</button>
        </div>
        
        <!-- TODAY'S TASKS TAB -->
        <div id="todaytasks" class="tab-content active">
            <!-- Summary Cards -->
            <div class="summary-section" id="summary-section"></div>
            
            <!-- Task Cards -->
            <div class="tasks-container" id="tasks-container">
                <p class="loading">Loading today's tasks...</p>
            </div>
        </div>
        
        <!-- WORK PROGRESS TAB -->
        <div id="workprogress" class="tab-content">
            <!-- Summary Cards -->
            <div class="summary-section" id="workprogress-summary"></div>
            
            <!-- Work Progress Task Cards -->
            <div class="tasks-container" id="workprogress-tasks">
                <p class="loading">Loading work progress...</p>
            </div>
        </div>
        
        <!-- VENDOR STATUS TAB -->
        <div id="vendors" class="tab-content">
            <div class="main-content">
                <div class="card">
                    <h2>👥 Vendors Not Finalized</h2>
                    <div class="card-content">
                        <ul class="item-list" id="vendors-list">
                            <li class="loading">Loading...</li>
                        </ul>
                    </div>
                </div>
                
                <div class="card">
                    <h2>📦 Materials Pending</h2>
                    <div class="card-content">
                        <ul class="item-list" id="materials-list">
                            <li class="loading">Loading...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- CHAT TAB -->
<div id="chat" class="tab-content">
    <div class="chatbot-section">
        <h2 style="margin-bottom: 15px;">🤖 Ask AI Assistant</h2>
        <div class="chat-box">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="question-input" placeholder="Ask anything about the project..." />
                <button onclick="askQuestion()">Send</button>
                <button id="voice-button" onclick="startVoiceInput()" style="background: #764ba2; padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🎤 Voice</button>
                <button id="voice-stop-button" onclick="stopVoiceInput()" style="background: #c62828; padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; display: none;">⏹️ Stop</button>
            </div>
        </div>
    </div>
</div>
    
    <script>
        // Tab switching function
        function switchTab(tabName, event) {
            // Hide all tabs
            const allTabs = document.querySelectorAll('.tab-content');
            allTabs.forEach(tab => tab.classList.remove('active'));
            
            // Remove active from all buttons
            const allButtons = document.querySelectorAll('.tab-button');
            allButtons.forEach(btn => btn.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            
            // Mark button as active
            if (event) {
                event.target.classList.add('active');
            }
            
            // Load data when tab is opened
            if (tabName === 'todaytasks') {
                loadTodaysTasks();
            }
            if (tabName === 'workprogress') {
                loadWorkProgress();
            }
        }
        
        // Load work progress
        async function loadWorkProgress() {
            try {
                const response = await fetch('/worktracker')
                const data = await response.json();
                
                if (data.success) {
                    displayWorkProgressSummary(data.counts);
                    displayWorkProgressTasks(data.tasks);
                } else {
                    document.getElementById('workprogress-tasks').innerHTML = 
                        '<p style="color: red;">Error loading work progress</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('workprogress-tasks').innerHTML = 
                    '<p style="color: red;">Cannot connect to server</p>';
            }
        }

        // Display work progress summary
        function displayWorkProgressSummary(counts) {
            const html = `
                <div class="summary-card critical">
                    <div class="summary-number">${counts.critical}</div>
                    <div class="summary-label">🔴 Critical</div>
                </div>
                <div class="summary-card high">
                    <div class="summary-number">${counts.delayed}</div>
                    <div class="summary-label">🟡 Delayed</div>
                </div>
                <div class="summary-card total">
                    <div class="summary-number">${counts.completed}</div>
                    <div class="summary-label">✅ Completed</div>
                </div>
            `;
            document.getElementById('workprogress-summary').innerHTML = html;
        }

        // Display work progress tasks
        function displayWorkProgressTasks(tasks) {
            const container = document.getElementById('workprogress-tasks');
            
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<p style="color: #999;">No tasks found</p>';
                return;
            }
            
            const html = tasks.map(task => {
                const cardClass = task.priority === 'CRITICAL' ? 'critical' : 'high';
                
                const progressHtml = task.progressHistory && task.progressHistory.length > 0
                    ? `
                        <div class="task-updates">
                            <div class="task-label">📈 Last 4 Weeks Progress:</div>
                            ${task.progressHistory.map(prog => `
                                <div class="update-item">
                                    <span class="update-date">${prog.week}:</span>
                                    <span class="update-msg">${prog.status}</span>
                                </div>
                            `).join('')}
                        </div>
                    `
                    : '';
                
                return `
                    <div class="task-card ${cardClass}">
                        <div class="task-title">${task.priority === 'CRITICAL' ? '🔴' : '🟡'} ${task.taskDesc}</div>
                        <div class="task-badges">
                            <span class="task-badge">Floor: ${task.floor}</span>
                            <span class="task-badge">Status: ${task.taskStatus}</span>
                            <span class="task-badge">Delay: ${task.delayDays} days</span>
                        </div>
                        
                        <div class="task-section">
                            <div class="task-label">Timeline:</div>
                            <div class="task-text">
                                Initial: ${task.initialStartDate} to ${task.initialFinishDate}<br>
                                Latest: ${task.latestStartDate} to ${task.latestFinishDate}
                            </div>
                        </div>
                        
                        <div class="task-section">
                            <div class="task-label">Dependency:</div>
                            <div class="task-text">${task.dependency}</div>
                        </div>
                        
                        <div class="task-action">
                            🤖 ${task.aiAnalysis}
                        </div>
                        
                        <div class="task-action" style="background: #e3f2fd; border-left-color: #1976d2;">
                            ✅ ${task.actionItem}
                        </div>
                        
                        ${progressHtml}
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }
        
        // Load today's tasks
        async function loadTodaysTasks() {
            try {
                const response = await fetch('/todaytasks');
                const data = await response.json();
                
                if (data.success) {
                    displaySummary(data.counts);
                    displayTasks(data.tasks);
                } else {
                    document.getElementById('tasks-container').innerHTML = 
                        '<p style="color: red;">Error loading tasks</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tasks-container').innerHTML = 
                    '<p style="color: red;">Cannot connect to server</p>';
            }
        }
        
        // Display summary cards
        function displaySummary(counts) {
            const html = `
                <div class="summary-card critical">
                    <div class="summary-number">${counts.critical}</div>
                    <div class="summary-label">🔴 Critical Today</div>
                </div>
                <div class="summary-card high">
                    <div class="summary-number">${counts.high}</div>
                    <div class="summary-label">🟡 High Priority</div>
                </div>
                <div class="summary-card total">
                    <div class="summary-number">${counts.critical + counts.high}</div>
                    <div class="summary-label">📊 Total Tasks</div>
                </div>
            `;
            document.getElementById('summary-section').innerHTML = html;
        }
        
        // Display task cards
        function displayTasks(tasks) {
            const container = document.getElementById('tasks-container');
            
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<p style="color: #999;">No tasks found</p>';
                return;
            }
            
            const html = tasks.map(task => {
                const cardClass = task.priority === 'CRITICAL' ? 'critical' : 'high';
                
                const recentUpdatesHtml = task.recentUpdates && task.recentUpdates.length > 0
                    ? `
                        <div class="task-updates">
                            <div class="task-label">📝 Recent Updates:</div>
                            ${task.recentUpdates.map(update => `
                                <div class="update-item">
                                    <span class="update-date">${update.date}:</span>
                                    <span class="update-msg">${update.message}</span>
                                </div>
                            `).join('')}
                        </div>
                    `
                    : '';
                
                return `
                    <div class="task-card ${cardClass}">
                        <div class="task-title">${task.priority === 'CRITICAL' ? '🔴' : '🟡'} ${task.item}</div>
                        <div class="task-badges">
                            <span class="task-badge">${task.status === 'W.I.P' ? '🔄 W.I.P' : '⏸️ OPEN'}</span>
                            <span class="task-badge">Vendor: ${task.vendorStatus}</span>
                            <span class="task-badge">${task.daysUntilStart} days</span>
                        </div>
                        
                        <div class="task-section">
                            <div class="task-label">Why ${task.priority}:</div>
                            <div class="task-text">${task.reason}</div>
                        </div>
                        
                        <div class="task-action">
                            ✅ ${task.actionNeeded}
                        </div>
                        
                        ${recentUpdatesHtml}
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }
        
        // Load vendors (for Vendor Status tab)
        async function loadVendors() {
  try {
    const response = await fetch('/ask?q=which vendors are not finalized');
    const data = await response.text();
    displayVendors(data);
  } catch (error) {
    document.getElementById('vendors-list').innerHTML =
      '<li>Error loading vendors</li>';
  }
}
        
        // Load materials
        async function loadMaterials() {
            try {
                const response = await fetch('/ask?q=which%20materials%20are%20pending');
                const data = await response.text();
                displayMaterials(data);
            } catch (error) {
                document.getElementById('materials-list').innerHTML = '<li>Error loading materials</li>';
            }
        }
        
        // Display vendors
        function displayVendors(data) {
            const list = document.getElementById('vendors-list');
            list.innerHTML = `<li><strong>Status:</strong> <span>${data.substring(0, 300)}...</span></li>`;
        }
        
        // Display materials
        function displayMaterials(data) {
            const list = document.getElementById('materials-list');
            list.innerHTML = `<li><strong>Status:</strong> <span>${data.substring(0, 300)}...</span></li>`;
        }
        
        // Chat functions
        function addMessage(text, type) {
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<div class="message-content">${text}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addBotMessage(text) {
            addMessage(text, 'bot');
        }
        
        function addUserMessage(text) {
            addMessage(text, 'user');
        }
        // ==========================================
        // 🎤 VOICE RECOGNITION & SPEECH SETUP
        // ==========================================
        let recognition;
        let isListening = false;

        function initializeVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addBotMessage('Sorry, your browser does not support voice recognition. Please use Chrome, Edge, or Safari.');
                return false;
            }
            
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            let transcript = '';
            
            recognition.onstart = function() {
                isListening = true;
                document.getElementById('voice-button').style.display = 'none';
                document.getElementById('voice-stop-button').style.display = 'block';
                addBotMessage('🎤 Listening... Speak now!');
            };
            
            recognition.onresult = function(event) {
                transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                
                document.getElementById('question-input').value = transcript;
                
                if (event.results[event.results.length - 1].isFinal) {
                    setTimeout(() => {
                        askQuestion();
                    }, 500);
                }
            };
            
            recognition.onerror = function(event) {
                addBotMessage('❌ Error: ' + event.error);
                stopVoiceInput();
            };
            
            recognition.onend = function() {
                isListening = false;
                document.getElementById('voice-button').style.display = 'block';
                document.getElementById('voice-stop-button').style.display = 'none';
            };
            
            return true;
        }

        function startVoiceInput() {
            if (!recognition) {
                if (!initializeVoiceRecognition()) return;
            }
            recognition.start();
        }

        function stopVoiceInput() {
            if (recognition) {
                recognition.stop();
            }
        }

        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        // ==========================================
        // END OF VOICE CODE
        // ==========================================
        // Ask question
        async function askQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            
            if (!question) return;
            
            // Add user message
            addUserMessage(question);
            input.value = '';
            
            // Show loading
            addBotMessage('Thinking... ⏳');
            
            try {
                const response = await fetch(
  `/ask?q=${encodeURIComponent(question)}`
);
                const answer = await response.text();
                
                // Remove loading message
                const messages = document.getElementById('chat-messages');
                const lastMessage = messages.lastChild;
                if (lastMessage && lastMessage.textContent.includes('Thinking')) {
                    messages.removeChild(lastMessage);
                }
                
             // Add answer
addBotMessage(answer);
speakText(answer);  // 🎤 ADD THIS
} catch (error) {
    const errorMsg = 'Sorry, there was an error. Please try again.';
    addBotMessage(errorMsg);
    speakText(errorMsg);  // 🎤 ADD THIS
}
        }
        
        // Load initial data
        window.addEventListener('load', function() {
            loadTodaysTasks();
            loadWorkProgress();
            loadVendors();
            loadMaterials();
            addBotMessage('Hi! 👋 I am your project assistant. Ask me anything about the K.K. Farm project!');
        });
        
        // Allow Enter key to send
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('question-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    askQuestion();
                }
            });
        });
    </script>
</body>
</html>
